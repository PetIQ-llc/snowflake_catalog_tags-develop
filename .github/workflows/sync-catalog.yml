# --------------------------------------------
# Workflow name shown in GitHub Actions UI
# --------------------------------------------
name: Sync Catalog Tags

# --------------------------------------------
# Define when this workflow runs
# - Scheduled run every day at 2 AM UTC
# - Can also be triggered manually
# --------------------------------------------
on:
  schedule:
    - cron: '0 2 * * *'

  # Manual trigger with optional parameters
  workflow_dispatch:
    inputs:

      # Select the sync mode when running manually
      mode:
        description: "Sync Mode"
        required: false
        type: choice
        options:
          - auto
          - full
          - drops-only
        default: auto

      # Optional limit on how many tables to process
      table_limit:
        description: "Number of tables (auto-selects limited mode)"
        required: false
        type: string
        default: ""

      # Optional list of specific table IDs to process
      table_ids:
        description: "Specific table IDs (comma-separated)"
        required: false
        type: string

      # Optional batch size for API requests
      batch_size:
        description: "Batch size for API calls (empty = 1000)"
        required: false
        type: string
        default: ""

# --------------------------------------------
# Global environment variables available
# to all jobs in this workflow
# --------------------------------------------
env:
  PYTHON_VERSION: "3.10"

# --------------------------------------------
# Define the job that performs the sync
# --------------------------------------------
jobs:
  sync-tags:

    # Use a Linux GitHub-hosted runner
    runs-on: ubuntu-latest

    steps:

      # --------------------------------------------
      # Step: Checkout repository code
      # Downloads the repo so the workflow can use it
      # --------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4


      # --------------------------------------------
      # Step: Install the specified Python version
      # --------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}


      # --------------------------------------------
      # Step: Cache Python dependencies
      # Speeds up future workflow runs by caching pip packages
      # --------------------------------------------
      - name: Cache Python dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-


      # --------------------------------------------
      # Step: Install Python dependencies
      # Installs all packages required by the project
      # --------------------------------------------
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt


      # --------------------------------------------
      # Step: Create folders used by the workflow
      # These store data, SQL output, logs, and reports
      # --------------------------------------------
      - name: Create output directories
        run: |
          mkdir -p data sql reports logs


      # --------------------------------------------
      # Step: Download artifact from previous run
      # This allows the script to compare current data
      # with the previous sync state
      # --------------------------------------------
      - name: Download previous run data
        id: download_previous
        uses: dawidd6/action-download-artifact@v6
        with:
          name: catalog-data
          path: data/
          workflow: sync-catalog.yml
          workflow_conclusion: success
          if_no_artifact_found: warn
          search_artifacts: true


      # --------------------------------------------
      # Step: Build and execute the sync command
      # Determines which mode to run and constructs
      # the correct CLI command for main.py
      # --------------------------------------------
      - name: Build and run sync command
        env:

          # API token used to authenticate with Coalesce
          COALESCE_API_TOKEN: ${{ secrets.COALESCE_API_TOKEN }}

          # API URL pulled from secrets or repository variables
          COALESCE_API_URL: ${{ secrets.COALESCE_API_URL || vars.COALESCE_API_URL }}

        run: |

          # Base command that will be modified later
          CMD="python main.py"

          # Read workflow inputs
          TABLE_IDS="${{ github.event.inputs.table_ids }}"
          TABLE_LIMIT="${{ github.event.inputs.table_limit }}"
          MODE_INPUT="${{ github.event.inputs.mode }}"
          BATCH_SIZE="${{ github.event.inputs.batch_size }}"

          # --------------------------------------------
          # Determine which execution mode to use
          # Priority:
          # 1) table_ids
          # 2) table_limit
          # 3) selected mode
          # --------------------------------------------
          if [ -n "$TABLE_IDS" ]; then
            MODE="specific"
            echo "Auto-detected specific mode (tables: $TABLE_IDS)"

          elif [ -n "$TABLE_LIMIT" ]; then
            MODE="limited"
            echo "Auto-detected limited mode (limit: $TABLE_LIMIT)"

          else
            MODE="${MODE_INPUT:-auto}"
          fi


          # --------------------------------------------
          # Modify command based on selected mode
          # --------------------------------------------
          case "$MODE" in

            auto)
              echo "Running in auto mode"
              CMD="$CMD --all-tables --batch-size 1000"
              ;;

            full)
              echo "Running in full mode"
              CMD="$CMD --all-tables"
              ;;

            limited)
              LIMIT="${TABLE_LIMIT:-10}"
              echo "Running limited mode ($LIMIT tables)"
              CMD="$CMD --limit $LIMIT"
              ;;

            specific)
              IDS=$(echo "$TABLE_IDS" | tr ',' ' ')
              CMD="$CMD --table-ids $IDS"
              ;;

            drops-only)
              CMD="$CMD --drops-only"
              ;;

          esac


          # --------------------------------------------
          # Add batch size to command if provided
          # --------------------------------------------
          if [ -n "$BATCH_SIZE" ]; then
            CMD="$CMD --batch-size $BATCH_SIZE"
          elif [ "$MODE" != "auto" ] && [ "$MODE" != "drops-only" ]; then
            CMD="$CMD --batch-size 1000"
          fi


          # --------------------------------------------
          # Execute the constructed command
          # --------------------------------------------
          echo "Executing: $CMD"
          $CMD


      # --------------------------------------------
      # Step: Upload catalog data artifact
      # This data will be used by the next workflow run
      # to detect changes
      # --------------------------------------------
      - name: Upload catalog data for next run
        uses: actions/upload-artifact@v4
        with:
          name: catalog-data
          path: data/catalog_columns_*.json
          retention-days: 30


      # --------------------------------------------
      # Step: Upload generated SQL statements
      # These are SQL commands to apply tags in Snowflake
      # --------------------------------------------
      - name: Upload SQL files
        uses: actions/upload-artifact@v4
        with:
          name: sql-files-${{ github.run_number }}
          path: sql/*.sql
          retention-days: 90


      # --------------------------------------------
      # Step: Upload report files generated by the script
      # --------------------------------------------
      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ github.run_number }}
          path: reports/*.txt
          retention-days: 90


      # --------------------------------------------
      # Step: Generate summary shown in the GitHub run UI
      # Parses the generated report to show metrics
      # --------------------------------------------
      - name: Generate run summary
        run: |

          # Show whether this run was scheduled or manual
          if [ "${{ github.event_name }}" == "schedule" ]; then
            echo "## Scheduled Sync Complete" >> $GITHUB_STEP_SUMMARY
          else
            echo "## Manual Sync Complete" >> $GITHUB_STEP_SUMMARY
          fi

          # Find the newest report file
          REPORT_FILE=$(ls -t reports/sync_report_*.txt 2>/dev/null | head -1)

          if [ -f "$REPORT_FILE" ]; then

            # Extract metrics from the report
            TABLES=$(grep "Tables found:" "$REPORT_FILE" | cut -d: -f2 | xargs)
            TAGGED=$(grep "Tables with tagged columns:" "$REPORT_FILE" | cut -d: -f2 | xargs)
            SQL_COUNT=$(grep "SQL statements generated:" "$REPORT_FILE" | cut -d: -f2 | xargs || echo "0")
            DROP_COUNT=$(grep "DROP TAG statements generated:" "$REPORT_FILE" | cut -d: -f2 | xargs || echo "0")

            # Add results to GitHub Actions summary panel
            echo "### Results" >> $GITHUB_STEP_SUMMARY
            echo "- Tables processed: $TABLES" >> $GITHUB_STEP_SUMMARY
            echo "- Tables with tags: $TAGGED" >> $GITHUB_STEP_SUMMARY
            echo "- SQL statements generated: $SQL_COUNT" >> $GITHUB_STEP_SUMMARY
            echo "- DROP TAG statements generated: $DROP_COUNT" >> $GITHUB_STEP_SUMMARY

          fi
